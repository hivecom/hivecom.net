name: Deploy Supabase & Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '0 3 */3 * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest

    environment: production
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      NUXT_PUBLIC_AUTH_EXTERNAL_DISCORD_CLIENT_ID: ${{ vars.NUXT_PUBLIC_AUTH_EXTERNAL_DISCORD_CLIENT_ID }}
      NUXT_PUBLIC_AUTH_EXTERNAL_PATREON_CLIENT_ID: ${{ vars.NUXT_PUBLIC_AUTH_EXTERNAL_PATREON_CLIENT_ID }}
      NUXT_PUBLIC_SUPABASE_PROJECT_REF: ${{ vars.NUXT_PUBLIC_SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint and typecheck
        run: npm run lint

  supabase:
    name: Supabase deploy
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1.6.0
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password
          "$SUPABASE_DB_PASSWORD"

      - name: Push DB migrations
        run: supabase db push

      - name: Deploy Supabase functions
        run: supabase functions deploy

  pages_build:
    name: Build static site
    runs-on: ubuntu-latest
    # Wait for both lint and Supabase so we only build clean, post-migration code.
    needs: [lint, supabase]

    environment: production
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      NUXT_PUBLIC_AUTH_EXTERNAL_DISCORD_CLIENT_ID: ${{ vars.NUXT_PUBLIC_AUTH_EXTERNAL_DISCORD_CLIENT_ID }}
      NUXT_PUBLIC_AUTH_EXTERNAL_PATREON_CLIENT_ID: ${{ vars.NUXT_PUBLIC_AUTH_EXTERNAL_PATREON_CLIENT_ID }}
      NUXT_PUBLIC_SUPABASE_PROJECT_REF: ${{ vars.NUXT_PUBLIC_SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Cache Nuxt build artifacts
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.cache/nuxt-fonts
            node_modules/.cache/nuxt-seo
          key: nuxt-caches-${{ runner.os }}-${{ hashFiles('nuxt.config.ts') }}
          restore-keys: |
            nuxt-caches-${{ runner.os }}-

      - name: Nuxt build with nitro for GitHub pages
        run: npm run build

      - name: Add GitHub Pages SPA fallback
        run: cp ./.output/public/200.html ./.output/public/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./.output/public

  pages_deploy:
    name: Publish to GitHub Pages
    needs: pages_build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github_pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
