name: Lint & Build

on:
  push:
    branches:
      - dev
  # Optional manual trigger
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    environment: development

    # Mirror prod env needed for a full build
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      NUXT_PUBLIC_AUTH_EXTERNAL_DISCORD_CLIENT_ID: ${{ vars.NUXT_PUBLIC_AUTH_EXTERNAL_DISCORD_CLIENT_ID }}
      NUXT_PUBLIC_AUTH_EXTERNAL_PATREON_CLIENT_ID: ${{ vars.NUXT_PUBLIC_AUTH_EXTERNAL_PATREON_CLIENT_ID }}
      NUXT_PUBLIC_SUPABASE_PROJECT_REF: ${{ vars.NUXT_PUBLIC_SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Cache Nuxt build artifacts
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.cache/nuxt-fonts
            node_modules/.cache/nuxt-seo
          key: nuxt-caches-${{ runner.os }}-${{ hashFiles('nuxt.config.ts') }}
          restore-keys: |
            nuxt-caches-${{ runner.os }}-

      - name: Lint and typecheck
        run: npm run lint

      - name: Build
        run: npm run build
